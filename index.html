<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Royale Web</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.hidden { display: none; }

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

input {
    padding: 10px;
    margin: 5px;
    width: 100%;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
}

.character {
    background: #334155;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">
    <h2>Login / Registro</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Iniciar sesión</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="hidden">
    <h2>Lobby</h2>
    <p>Monedas: <span id="coins">0</span></p>

    <button onclick="openShop()">Cambiar personaje</button>
    <button onclick="openJoin()">Unirse a sala</button>
    <button onclick="openPlay()">Jugar</button>

    <div id="shop" class="hidden"></div>
    <div id="join" class="hidden"></div>
    <div id="play" class="hidden"></div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <h2>Partida</h2>
    <p id="gameStatus"></p>
</div>

</div>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
authDomain: "kahoot-8529e.firebaseapp.com",
databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
projectId: "kahoot-8529e",
storageBucket: "kahoot-8529e.firebasestorage.app",
messagingSenderId: "313414356056",
appId: "1:313414356056:web:4aab4587f7df9393008e2d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let coins = 0;
let ownedCharacters = ["Character 1"];

// LOGIN / REGISTER
window.register = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    const user = await createUserWithEmailAndPassword(auth, email, pass);
    currentUser = user.user;

    await set(ref(db, "users/" + currentUser.uid), {
        coins: 0,
        characters: ["Character 1"]
    });

    startLobby();
};

window.login = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    const user = await signInWithEmailAndPassword(auth, email, pass);
    currentUser = user.user;

    const snapshot = await get(ref(db, "users/" + currentUser.uid));
    const data = snapshot.val();

    coins = data.coins;
    ownedCharacters = data.characters;

    startLobby();
};

function startLobby() {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("lobby").classList.remove("hidden");
    updateCoins();
}

// COINS
function updateCoins() {
    document.getElementById("coins").innerText = coins;
}

// SHOP
window.openShop = () => {
    const shop = document.getElementById("shop");
    shop.classList.toggle("hidden");
    shop.innerHTML = "<h3>Tienda</h3><div class='grid' id='chars'></div>";

    const grid = document.getElementById("chars");

    for (let i = 1; i <= 125; i++) {
        let price = i * 2;
        let name = "Character " + i;

        let div = document.createElement("div");
        div.className = "character";
        div.innerHTML = `
            <p>${name}</p>
            <p>${price} coins</p>
            <button onclick="buyCharacter('${name}', ${price})">Comprar</button>
        `;
        grid.appendChild(div);
    }
};

window.buyCharacter = async (name, price) => {
    if (coins >= price && !ownedCharacters.includes(name)) {
        coins -= price;
        ownedCharacters.push(name);

        await set(ref(db, "users/" + currentUser.uid), {
            coins,
            characters: ownedCharacters
        });

        updateCoins();
        alert("Comprado!");
    }
};

// JOIN ROOM
window.openJoin = () => {
    const join = document.getElementById("join");
    join.classList.toggle("hidden");

    join.innerHTML = `
        <h3>Unirse a sala</h3>
        <input id="roomCode" placeholder="Código">
        <button onclick="joinRoom()">Unirse</button>
    `;
};

window.joinRoom = async () => {
    const code = document.getElementById("roomCode").value;

    const snapshot = await get(ref(db, "rooms/" + code));
    if (snapshot.exists()) {
        alert("Te uniste a la sala!");
    } else {
        alert("Sala no existe");
    }
};

// PLAY MENU
window.openPlay = () => {
    const play = document.getElementById("play");
    play.classList.toggle("hidden");

    play.innerHTML = `
        <h3>Modo de juego</h3>
        <button onclick="playBots()">Jugar con Bots</button>
        <button onclick="createRoom()">Crear sala</button>
    `;
};

// BOT GAME
window.playBots = () => {
    document.getElementById("lobby").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    let players = 10;

    let interval = setInterval(() => {
        players--;
        document.getElementById("gameStatus").innerText = "Jugadores restantes: " + players;

        if (players <= 1) {
            clearInterval(interval);

            let reward = Math.floor(Math.random() * 3);

            if (reward === 0) coins += 10;
            if (reward === 1) coins += 5;
            if (reward === 2) coins += 2;

            alert("Fin de partida! Monedas ganadas!");
            location.reload();
        }
    }, 1000);
};

// CREATE ROOM
window.createRoom = async () => {
    const code = Math.random().toString(36).substring(2, 8);

    await set(ref(db, "rooms/" + code), {
        players: [currentUser.uid],
        map: "default"
    });

    alert("Sala creada: " + code);
};

</script>

</body>
</html>
