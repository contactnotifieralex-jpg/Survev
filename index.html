// ─── BACKGROUND CANVAS ─────────────────────────────────
(function initBgCanvas(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,particles=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function spawnParticle(){
    return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.3,alpha:Math.random()*.5+.1,color:Math.random()>.5?'0,255,231':'255,45,120'};
  }
  for(let i=0;i<120;i++)particles.push(spawnParticle());
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${p.alpha})`;ctx.fill();
    });
    // grid lines
    ctx.strokeStyle='rgba(0,255,231,0.025)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── TOAST ─────────────────────────────────────────────
function toast(msg,type='info',dur=3000){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.style.opacity='0',dur);
  setTimeout(()=>t.remove(),dur+500);
}
window.toast=toast;

// ─── AUTH ───────────────────────────────────────────────
window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  err.classList.remove('show');
  if(!email||!pass){err.textContent='Rellena todos los campos.';err.classList.add('show');return;}
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    err.textContent=e.code==='auth/invalid-credential'?'Credenciales incorrectas.':'Error: '+e.message;
    err.classList.add('show');
  }
};

window.joinRoomByCode=async function(){
  const code=document.getElementById('join-code-input').value.trim().toUpperCase();
  const errEl=document.getElementById('join-error');
  errEl.classList.remove('show');
  if(code.length!==6){errEl.textContent='El código debe tener 6 caracteres.';errEl.classList.add('show');return;}
  const snap=await get(ref(db,'rooms'));
  let found=null,foundKey=null;
  snap.forEach(r=>{const d=r.val();if(d.code===code&&d.status==='waiting'){found=d;foundKey=r.key;}});
  if(!found){errEl.textContent='Sala no encontrada o ya empezada.';errEl.classList.add('show');return;}
  const playerCount=Object.keys(found.players||{}).length;
  if(playerCount>=10){errEl.textContent='La sala está llena (máx. 10 jugadores).';errEl.classList.add('show');return;}
  currentRoomId=foundKey;isHost=false;
  const char=CHARACTERS.find(c=>c.id===(userData.currentChar||'char_0'))||CHARACTERS[0];
  await update(ref(db,`rooms/${currentRoomId}/players/${currentUser.uid}`),{name:userData.username,char:char.emoji,ready:true,host:false});
  closeModal('modal-join');
  subscribeRoom();
  const codeDisplay=found.code;
  document.getElementById('room-code-display').textContent=codeDisplay;
  document.getElementById('room-map-name').textContent=MAPS.find(m=>m.id===found.map)?.name||found.map;
  showScreen('room-lobby-screen');
  toast('¡Unido a la sala!','success');
};

window.copyRoomCode=function(){

  navigator.clipboard.writeText(code).then(()=>toast('Código copiado!','success'));
};

function subscribeRoom(){
  if(roomListener)off(ref(db,`rooms/${currentRoomId}`),roomListener);
  roomListener=onValue(ref(db,`rooms/${currentRoomId}`),snap=>{
    if(!snap.exists()){toast('La sala fue cerrada.','error');leaveRoom();return;}
    const data=snap.val();
    if(data.status==='started'){
      off(ref(db,`rooms/${currentRoomId}`));
      startOnlineGame(data);
      return;
    }
    renderRoomLobby(data);
  });
}

function renderRoomLobby(data){
  const players=data.players||{};
  const keys=Object.keys(players);
  document.getElementById('room-player-count').textContent=`${keys.length} / 10`;
  document.getElementById('room-players-list').innerHTML=keys.map(uid=>{
    const p=players[uid];
    return`<div class="player-row">
      <div class="player-ava ${p.host?'is-host':''}">${p.char||'🎮'}</div>
      <div class="player-pname">${p.name||'?'}</div>
      <span class="player-badge ${p.host?'badge-host':'badge-ready'}">${p.host?'HOST':'LISTO'}</span>
    </div>`;
  }).join('');
  const canStart=isHost&&keys.length>=2;
  document.getElementById('btn-start-room').disabled=!canStart;
  document.getElementById('room-status-text').textContent=keys.length<2?`Esperando jugadores... (${keys.length}/2 mínimo)`:`${keys.length} jugadores listos ${isHost?'— Puedes iniciar!':'— Esperando al host...'}`;
}

async function leaveRoomCleanup(){
  if(!currentRoomId)return;
  if(roomListener){off(ref(db,`rooms/${currentRoomId}`));roomListener=null;}
  if(isHost){await remove(ref(db,`rooms/${currentRoomId}`));}
  else if(currentUser){await remove(ref(db,`rooms/${currentRoomId}/players/${currentUser.uid}`));}
  currentRoomId=null;isHost=false;
}

// ─── GAME ENGINE ───────────────────────────────────────
function initGame(config){
  showScreen('game-screen');
  const canvas=document.getElementById('game-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const map=MAPS.find(m=>m.id===config.map)||MAPS[0];
  const char=CHARACTERS.find(c=>c.id===(userData?.currentChar||'char_0'))||CHARACTERS[0];
  const TOTAL=config.playerCount||10;
  const W=canvas.width,H=canvas.height;
  const WORLD=2000;

  gameStartTime=Date.now();

  // Build obstacles based on map
  function buildObstacles(mapId){
    const obs=[];
    const count=mapId==='city'?60:mapId==='jungle'?40:mapId==='arctic'?30:mapId==='desert'?25:mapId==='volcano'?50:mapId==='space'?20:35;
    for(let i=0;i<count;i++){
      const w=40+Math.random()*120,h=40+Math.random()*120;
      obs.push({x:100+Math.random()*(WORLD-200-w),y:100+Math.random()*(WORLD-200-h),w,h,color:mapId==='city'?'#2a2a4a':mapId==='jungle'?'#1a4a20':mapId==='arctic'?'#3a5a7a':mapId==='desert'?'#6a5a30':mapId==='volcano'?'#4a1a10':'#1a1a3a'});
    }
    return obs;
  }
  const obstacles=buildObstacles(map.id);

  // Items (health packs, ammo)
  const items=[];
  for(let i=0;i<30;i++)items.push({x:150+Math.random()*(WORLD-300),y:150+Math.random()*(WORLD-300),type:Math.random()>.5?'health':'shield',active:true,emoji:Math.random()>.5?'❤️':'🛡️'});

  gameState={
    mode:config.mode,map:config.map,
    player:{x:WORLD/2,y:WORLD/2,vx:0,vy:0,hp:100,maxHp:100,shield:50,maxShield:100,kills:0,damage:0,alive:true,emoji:char.emoji,name:userData?.username||'Tú',angle:0},
    bots:[],
    bullets:[],
    zone:{x:WORLD/2,y:WORLD/2,r:WORLD*0.8,targetR:WORLD*0.4,shrinkSpeed:0.05,nextShrink:30000,timer:30},
    alive:TOTAL,total:TOTAL,
    obstacles,items,
    camera:{x:0,y:0},
    keys:{},
    mouse:{x:W/2,y:H/2},
    WORLD,W,H,
    startTime:Date.now(),
    ended:false,
    kills:0,damageDealt:0,
  };

  // Spawn bots
  const botEmojis=['🤖','👾','💀','👹','👺','🧟','👻','🎃','🦹','🤡'];
  const botNames=['Bot_Alpha','Bot_Bravo','Bot_Charlie','Bot_Delta','Bot_Echo','Bot_Foxtrot','Bot_Ghost','Bot_Hunter','Bot_Inferno'];
  for(let i=0;i<TOTAL-1;i++){
    let bx,by,tries=0;
    do{bx=150+Math.random()*(WORLD-300);by=150+Math.random()*(WORLD-300);tries++;}while(tries<20&&dist(bx,by,gameState.player.x,gameState.player.y)<300);
    gameState.bots.push({x:bx,y:by,vx:0,vy:0,hp:100,maxHp:100,shield:Math.floor(Math.random()*60),maxShield:100,alive:true,emoji:botEmojis[i%botEmojis.length],name:botNames[i]||`Bot_${i+1}`,angle:Math.random()*Math.PI*2,target:null,shootCooldown:0,moveCooldown:0,aggro:0.5+Math.random()*0.5,kills:0,id:i});
  }

  // Input
  const keyH=e=>{gameState.keys[e.code]=e.type==='keydown';};
  document.addEventListener('keydown',keyH);document.addEventListener('keyup',keyH);
  const mouseH=e=>{gameState.mouse.x=e.clientX;gameState.mouse.y=e.clientY;gameState.player.angle=Math.atan2(e.clientY-H/2,e.clientX-W/2);};
  canvas.addEventListener('mousemove',mouseH);
  const clickH=e=>{if(!gameState.player.alive||gameState.ended)return;spawnBullet(gameState.player,true);};
  canvas.addEventListener('click',clickH);

  gameState._cleanup=()=>{document.removeEventListener('keydown',keyH);document.removeEventListener('keyup',keyH);canvas.removeEventListener('mousemove',mouseH);canvas.removeEventListener('click',clickH);};

  // Zone shrink countdown
  let zoneCountdown=30;
  gameState._zoneInterval=setInterval(()=>{
    if(gameState.ended)return;
    zoneCountdown--;
    document.getElementById('hud-zone-time').textContent=zoneCountdown+'s';
    if(zoneCountdown<=0){
      gameState.zone.targetR=Math.max(gameState.zone.r*0.6,100);
      zoneCountdown=25;
      toast('⚠️ La zona se contrae!','error',2000);
    }
  },1000);

  if(gameLoop)cancelAnimationFrame(gameLoop);
  function loop(){
    if(gameState.ended)return;
    update();
    render(ctx,canvas,map);
    gameLoop=requestAnimationFrame(loop);
  }
  loop();
  showCountdown(3);
}

function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

function spawnBullet(entity,isPlayer){
  const speed=12;
  gameState.bullets.push({
    x:entity.x,y:entity.y,
    vx:Math.cos(entity.angle)*speed,vy:Math.sin(entity.angle)*speed,
    owner:isPlayer?'player':entity.id,
    isPlayer,damage:20+Math.floor(Math.random()*15),ttl:60
  });
}

function update(){
  const gs=gameState;
  const SPEED=4;

  // Player movement
  if(gs.player.alive){
    gs.player.vx=0;gs.player.vy=0;
    if(gs.keys['KeyW']||gs.keys['ArrowUp'])gs.player.vy=-SPEED;
    if(gs.keys['KeyS']||gs.keys['ArrowDown'])gs.player.vy=SPEED;
    if(gs.keys['KeyA']||gs.keys['ArrowLeft'])gs.player.vx=-SPEED;
    if(gs.keys['KeyD']||gs.keys['ArrowRight'])gs.player.vx=SPEED;
    if(gs.player.vx&&gs.player.vy){gs.player.vx*=0.707;gs.player.vy*=0.707;}
    let nx=gs.player.x+gs.player.vx,ny=gs.player.y+gs.player.vy;
    nx=Math.max(20,Math.min(gs.WORLD-20,nx));ny=Math.max(20,Math.min(gs.WORLD-20,ny));
    if(!collidesWithObs(nx,ny)){gs.player.x=nx;gs.player.y=ny;}
  }

  // Camera
  gs.camera.x=gs.player.x-gs.W/2;
  gs.camera.y=gs.player.y-gs.H/2;

  // Zone shrink
  if(gs.zone.r>gs.zone.targetR)gs.zone.r-=gs.zone.shrinkSpeed;

  // Player in zone check
  if(gs.player.alive){
    const pd=dist(gs.player.x,gs.player.y,gs.zone.x,gs.zone.y);
    if(pd>gs.zone.r){
      gs.player.hp-=0.15;
      document.getElementById('zone-warning').style.display='block';
    }else{document.getElementById('zone-warning').style.display='none';}
    if(gs.player.hp<=0)playerDied();
  }

  // Bots AI
  gs.bots.forEach(bot=>{
    if(!bot.alive)return;
    bot.shootCooldown=Math.max(0,bot.shootCooldown-1);
    bot.moveCooldown=Math.max(0,bot.moveCooldown-1);

    // Zone damage
    if(dist(bot.x,bot.y,gs.zone.x,gs.zone.y)>gs.zone.r)bot.hp-=0.12;
    if(bot.hp<=0){bot.alive=false;gs.alive--;updateAliveHUD();return;}

    // Find target
    let target=gs.player.alive?gs.player:null;
    let minD=9999;
    gs.bots.forEach(b2=>{if(b2.alive&&b2!==bot){const d=dist(bot.x,bot.y,b2.x,b2.y);if(d<minD&&d<800){minD=d;target=b2;}}});
    if(gs.player.alive){const dp=dist(bot.x,bot.y,gs.player.x,gs.player.y);if(dp<minD)target=gs.player;}

    if(target){
      const dx=target.x-bot.x,dy=target.y-bot.y;
      const td=Math.sqrt(dx*dx+dy*dy);
      bot.angle=Math.atan2(dy,dx);
      // Move toward target if far
      if(td>200&&bot.moveCooldown<=0){
        const speed=2.2*bot.aggro;
        let nbx=bot.x+(dx/td)*speed,nby=bot.y+(dy/td)*speed;
        nbx=Math.max(20,Math.min(gs.WORLD-20,nbx));nby=Math.max(20,Math.min(gs.WORLD-20,nby));
        if(!collidesWithObs(nbx,nby)){bot.x=nbx;bot.y=nby;}
        else{bot.moveCooldown=10;}
      }
      // Shoot
      if(td<500&&bot.shootCooldown<=0){
        spawnBullet(bot,false);
        bot.shootCooldown=Math.floor(40+Math.random()*60*(1-bot.aggro+0.2));
      }
    }else{
      // Wander
      if(bot.moveCooldown<=0){
        const wanderAngle=bot.angle+(Math.random()-.5)*1.5;
        bot.angle=wanderAngle;
        bot.moveCooldown=30+Math.floor(Math.random()*60);
      }
      const spd=1.5;
      let nbx=bot.x+Math.cos(bot.angle)*spd,nby=bot.y+Math.sin(bot.angle)*spd;
      nbx=Math.max(20,Math.min(gs.WORLD-20,nbx));nby=Math.max(20,Math.min(gs.WORLD-20,nby));
      if(!collidesWithObs(nbx,nby)){bot.x=nbx;bot.y=nby;}
      else{bot.angle+=Math.PI/2;}
    }
  });

  // Bullets
  gs.bullets=gs.bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.ttl--;
    if(b.ttl<=0||b.x<0||b.x>gs.WORLD||b.y<0||b.y>gs.WORLD)return false;
    if(collidesWithObs(b.x,b.y))return false;
    // Hit player
    if(!b.isPlayer&&gs.player.alive&&dist(b.x,b.y,gs.player.x,gs.player.y)<18){
      let dmg=b.damage;
      if(gs.player.shield>0){const sd=Math.min(gs.player.shield,dmg);gs.player.shield-=sd;dmg-=sd;}
      gs.player.hp=Math.max(0,gs.player.hp-dmg);
      updateHPHUD();
      if(gs.player.hp<=0)playerDied();
      return false;
    }
    // Hit bots
    if(b.isPlayer){
      for(let bot of gs.bots){
        if(bot.alive&&dist(b.x,b.y,bot.x,bot.y)<18){
          let dmg=b.damage;gs.player.damageDealt=(gs.player.damageDealt||0)+dmg;gs.damageDealt=(gs.damageDealt||0)+dmg;
          if(bot.shield>0){const sd=Math.min(bot.shield,dmg);bot.shield-=sd;dmg-=sd;}
          bot.hp=Math.max(0,bot.hp-dmg);
          if(bot.hp<=0){
            bot.alive=false;gs.alive--;
            gs.player.kills++;gs.kills++;
            document.getElementById('hud-kill-count').textContent=gs.kills;
            updateAliveHUD();
            addKillFeed(gs.player.name,bot.name);
            checkWin();
          }
          return false;
        }
      }
    }
    // Bot vs bot
    if(!b.isPlayer){
      for(let bot of gs.bots){
        if(bot.alive&&bot.id!==b.owner&&dist(b.x,b.y,bot.x,bot.y)<18){
          let dmg=b.damage;
          if(bot.shield>0){const sd=Math.min(bot.shield,dmg);bot.shield-=sd;dmg-=sd;}
          bot.hp=Math.max(0,bot.hp-dmg);
          if(bot.hp<=0){bot.alive=false;gs.alive--;updateAliveHUD();}
          return false;
        }
      }
    }
    return true;
  });

  // Items pickup
  gs.items.forEach(item=>{
    if(!item.active||!gs.player.alive)return;
    if(dist(item.x,item.y,gs.player.x,gs.player.y)<24){
      item.active=false;
      if(item.type==='health'){gs.player.hp=Math.min(gs.player.maxHp,gs.player.hp+30);toast('+30 vida ❤️','success',1500);}
      else{gs.player.shield=Math.min(gs.player.maxShield,gs.player.shield+30);toast('+30 escudo 🛡️','info',1500);}
      updateHPHUD();
    }
  });

  updateHPHUD();
}

function collidesWithObs(x,y){
  for(const o of gameState.obstacles){
    if(x>o.x&&x<o.x+o.w&&y>o.y&&y<o.y+o.h)return true;
  }
  return false;
}

function updateHPHUD(){
  const p=gameState.player;
  document.getElementById('hp-bar').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('hp-val').textContent=`${Math.ceil(p.hp)} / ${p.maxHp}`;
  document.getElementById('shield-bar').style.width=(p.shield/p.maxShield*100)+'%';
  document.getElementById('shield-val').textContent=`${Math.ceil(p.shield)} / ${p.maxShield}`;
}

function updateAliveHUD(){
  document.getElementById('hud-alive').textContent=gameState.alive;
}

function addKillFeed(killer,victim){
  const kf=document.getElementById('kill-feed');
  const el=document.createElement('div');
  el.className='kill-entry';
  el.innerHTML=`<span class="killer">${killer}</span> 💀 <span class="victim">${victim}</span>`;
  kf.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),1000);},4000);
  while(kf.children.length>5)kf.removeChild(kf.firstChild);
}

function render(ctx,canvas,map){
  const gs=gameState;
  const cx=Math.round(gs.camera.x),cy=Math.round(gs.camera.y);
  ctx.save();ctx.translate(-cx,-cy);

  // Background
  ctx.fillStyle=map.color;
  ctx.fillRect(0,0,gs.WORLD,gs.WORLD);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<gs.WORLD;x+=100){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,gs.WORLD);ctx.stroke();}
  for(let y=0;y<gs.WORLD;y+=100){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(gs.WORLD,y);ctx.stroke();}

  // Zone circle
  ctx.beginPath();ctx.arc(gs.zone.x,gs.zone.y,gs.zone.r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,255,231,0.6)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='rgba(255,50,50,0.07)';
  ctx.beginPath();ctx.rect(0,0,gs.WORLD,gs.WORLD);
  ctx.arc(gs.zone.x,gs.zone.y,gs.zone.r,0,Math.PI*2,true);
  ctx.fill('evenodd');

  // Obstacles
  gs.obstacles.forEach(o=>{
    ctx.fillStyle=o.color;ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
    ctx.strokeRect(o.x,o.y,o.w,o.h);
  });

  // Items
  gs.items.forEach(item=>{
    if(!item.active)return;
    ctx.font='20px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(item.emoji,item.x,item.y);
  });

  // Bots
  gs.bots.forEach(bot=>{
    if(!bot.alive)return;
    drawEntity(ctx,bot,false);
  });

  // Player
  if(gs.player.alive)drawEntity(ctx,gs.player,true);

  // Bullets
  gs.bullets.forEach(b=>{
    ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);
    ctx.fillStyle=b.isPlayer?'#ffee00':'#ff5500';
    ctx.shadowBlur=8;ctx.shadowColor=b.isPlayer?'#ffee00':'#ff5500';
    ctx.fill();ctx.shadowBlur=0;
  });

  ctx.restore();

  // Minimap
  renderMinimap(gs);
}

function drawEntity(ctx,e,isPlayer){
  ctx.save();ctx.translate(e.x,e.y);
  // Shadow
  ctx.beginPath();ctx.arc(0,4,18,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fill();
  // Circle
  ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);
  ctx.fillStyle=isPlayer?'rgba(0,255,231,0.2)':'rgba(255,100,100,0.2)';
  ctx.strokeStyle=isPlayer?'#00ffe7':'#ff5050';
  ctx.lineWidth=2;ctx.fill();ctx.stroke();
  // Emoji
  ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e.emoji,0,0);
  // HP bar
  const bw=36,bh=4,bx=-bw/2,by=-26;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by,bw,bh);
  const hpPct=Math.max(0,e.hp/e.maxHp);
  ctx.fillStyle=hpPct>0.5?'#00ff88':hpPct>0.25?'#ffaa00':'#ff3a3a';
  ctx.fillRect(bx,by,bw*hpPct,bh);
  // Shield bar
  if((e.shield||0)>0){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by-6,bw,3);
    ctx.fillStyle='#00aaff';ctx.fillRect(bx,by-6,bw*(e.shield/e.maxShield),3);
  }
  // Name
  if(isPlayer){ctx.fillStyle='#fff';ctx.font='bold 11px Rajdhani,sans-serif';ctx.textAlign='center';ctx.fillText(e.name,0,-34);}
  ctx.restore();
}

function renderMinimap(gs){
  const mc=document.getElementById('minimap-canvas');
  const mctx=mc.getContext('2d');
  const size=150,scale=size/gs.WORLD;
  mctx.fillStyle='rgba(5,10,15,0.95)';mctx.fillRect(0,0,size,size);
  // Zone
  mctx.beginPath();mctx.arc(gs.zone.x*scale,gs.zone.y*scale,gs.zone.r*scale,0,Math.PI*2);
  mctx.strokeStyle='rgba(0,255,231,0.5)';mctx.lineWidth=1;mctx.stroke();
  // Bots
  gs.bots.forEach(b=>{if(!b.alive)return;mctx.beginPath();mctx.arc(b.x*scale,b.y*scale,2,0,Math.PI*2);mctx.fillStyle='#ff5050';mctx.fill();});
  // Items
  gs.items.forEach(item=>{if(!item.active)return;mctx.beginPath();mctx.arc(item.x*scale,item.y*scale,2,0,Math.PI*2);mctx.fillStyle=item.type==='health'?'#ff4444':'#4444ff';mctx.fill();});
  // Player
  if(gs.player.alive){mctx.beginPath();mctx.arc(gs.player.x*scale,gs.player.y*scale,4,0,Math.PI*2);mctx.fillStyle='#00ffe7';mctx.fill();}
  // Camera rect
  mctx.strokeStyle='rgba(255,255,255,0.3)';mctx.lineWidth=1;
  mctx.strokeRect(gs.camera.x*scale,gs.camera.y*scale,gs.W*scale,gs.H*scale);
}

function playerDied(){
  const gs=gameState;
  if(!gs.player.alive||gs.ended)return;
  gs.player.alive=false;
  gs.alive--;updateAliveHUD();
  const survived=gs.bots.filter(b=>b.alive).length;
  const place=gs.total-survived;
  toast(`Eliminado. Puesto #${place}`,'error',3000);
  setTimeout(()=>endGame(place,gs.kills,gs.damageDealt||0),2500);
}

function checkWin(){
  const gs=gameState;
  const aliveBots=gs.bots.filter(b=>b.alive).length;
  if(aliveBots===0&&gs.player.alive){
    gs.ended=true;
    clearInterval(gs._zoneInterval);
    gs._cleanup&&gs._cleanup();
    setTimeout(()=>endGame(1,gs.kills,gs.damageDealt||0),800);
  }
}

async function endGame(place,kills,damage){
  if(gameState){gameState.ended=true;clearInterval(gameState._zoneInterval);}
  if(gameLoop)cancelAnimationFrame(gameLoop);
  gameState?._cleanup?.();

  const time=Math.floor((Date.now()-(gameStartTime||Date.now()))/1000);
  let posCoins=place===1?10:place===2?5:place===3?2:0;
  let killCoins=kills;
  let total=posCoins+killCoins;

  // Update Firebase
  if(currentUser&&userData){
    const newCoins=(userData.coins||0)+total;
    const newWins=(userData.wins||0)+(place===1?1:0);
    const newKills=(userData.kills||0)+kills;
    const newGames=(userData.games||0)+1;
    await update(ref(db,`users/${currentUser.uid}`),{coins:newCoins,wins:newWins,kills:newKills,games:newGames});
    userData.coins=newCoins;userData.wins=newWins;userData.kills=newKills;userData.games=newGames;
    // Global leaderboard
    await update(ref(db,`leaderboard/${currentUser.uid}`),{name:userData.username,wins:newWins,kills:newKills});
  }

  // Result screen
  const placeEl=document.getElementById('result-place');
  const titleEl=document.getElementById('result-title');
  const subEl=document.getElementById('result-sub');
  if(place===1){placeEl.textContent='🏆';placeEl.className='result-rank place1';titleEl.textContent='VICTORIA ROYALE';subEl.textContent='¡Eres el último en pie!';}
  else if(place===2){placeEl.textContent='🥈';placeEl.className='result-rank place2';titleEl.textContent='2º PUESTO';subEl.textContent='¡Casi la victoria!';}
  else if(place===3){placeEl.textContent='🥉';placeEl.className='result-rank place3';titleEl.textContent='3er PUESTO';subEl.textContent='Pódium alcanzado.';}
  else{placeEl.textContent=`#${place}`;placeEl.className='result-rank other';titleEl.textContent='ELIMINADO';subEl.textContent=`Puesto ${place} de ${gameState?.total||10}.`;}

  document.getElementById('res-kills').textContent=kills;
  document.getElementById('res-dmg').textContent=damage;
  document.getElementById('res-time').textContent=time+'s';
  document.getElementById('rw-kills').textContent=`+${killCoins} 🪙`;
  document.getElementById('rw-pos').textContent=`+${posCoins} 🪙`;
  document.getElementById('rw-total').textContent=`+${total} 🪙`;

  showScreen('result-screen');
}

window.goBackToLobby=async function(){
  if(currentRoomId)await leaveRoomCleanup();
  await loadUserData();
  renderLobby();
  loadLeaderboard();
  showScreen('lobby-screen');
  document.getElementById('kill-feed').innerHTML='';
};

function showCountdown(n){
  const el=document.getElementById('countdown-overlay');
  el.style.display='flex';
  let c=n;
  function tick(){
    el.innerHTML=`<div class="countdown-num">${c}</div>`;
    if(c<=0){el.style.display='none';return;}
    c--;setTimeout(tick,900);
  }
  tick();
}

// On load
setTimeout(()=>{
  document.getElementById('loading-overlay').style.transition='opacity 0.5s';
  document.getElementById('loading-overlay').style.opacity='0';
  setTimeout(()=>document.getElementById('loading-overlay').style.display='none',500);
},1800);
</script>
